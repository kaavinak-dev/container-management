version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: hangfire-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    networks:
      - hangfire-network

networks:
  hangfire-network:
    driver: bridge
