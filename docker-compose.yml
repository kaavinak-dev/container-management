version: '3.8'

services:

  # ── Job Queue (Hangfire) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hangfire-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - infra

  # ── Virus Scanning ─────────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:latest
    container_name: clamav-server
    restart: unless-stopped
    ports:
      - "3310:3310"
    environment:
      - CLAMAV_NO_FRESHCLAM=false
      - FRESHCLAM_CHECKS=24
      - CLAMD_CONF_MaxFileSize=100M
      - CLAMD_CONF_MaxScanSize=500M
      - CLAMD_CONF_MaxThreads=10
    networks:
      - infra

  # ── File Storage (MinIO) ───────────────────────────────────────────────────
  minio-1:
    image: minio/minio
    container_name: minio-1
    restart: unless-stopped
    command: server /data
    ports:
      - "9002:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio1-data:/data
    networks:
      - infra

  minio-2:
    image: minio/minio
    container_name: minio-2
    restart: unless-stopped
    command: server /data
    ports:
      - "9003:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio2-data:/data
    networks:
      - infra

  # ── Metadata Database (PostgreSQL) ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: container_management
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - infra

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - infra

volumes:
  redis-data:
  minio1-data:
  minio2-data:
  postgres-data:
  pgadmin-data:

networks:
  infra:
    driver: bridge
